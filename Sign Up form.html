<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <form action="#" method="get" style="text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-decoration: solid;">
        <h1 style="text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
            Sign Up
        </h1>
        <hr>
        <label for="name1"> 
            First Name :
        </label>
        <input type="text;" name="First_Name" id="name1" placeholder="Abdullah">
        <br>
        <label for="name2"> 
            Last Name :
        </label>
        <input type="text;" name="Last_Name" id="name2" placeholder="Jahangir">
        <br>
        <label for="email"> 
            Email Address :
        </label>
        <input type="email" name="Email" id="email" placeholder="example@gmail.com" required>
        <br>
        <label for="pass1"> 
            Password :
        </label>
        <input type="password" name="Password" id="pass1" placeholder="2cw3xVy$" required>
        <br>
        <label for="ctry"> Country : </label>
        <select name="Country" id="ctry">
            <option value="Australia"> Austrolia </option>
            <option value="Bangladesh"> Bangladesh </option>
            <option value="India"> India </option>
            <option value="Pakistan"> Pakistan </option>
            <option value="Afganistan"> Afganistan </option>
            <option value="Iraq"> Iraq </option>
            <option value="Iran"> Iran </option>
            <option value="Saudi Arabia"> Saudi Arabia </option>
            <option value="UAE"> UAE </option>
            <option value="Bahrain"> Bahrain </option>
            <option value="Oman"> Oman </option>
            <option value="Qatar"> Qatar </option>
            <option value="Kuet"> Kuet </option>
            <option value="Etheophia"> Etheophia </option>
            <option value="Egypt"> Egypt </option>
            <option value="Lebanon"> Lebanon </option>
            <option value="Libia"> Libia </option>
        </select>
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    
    </form> 
</body>
</html>
